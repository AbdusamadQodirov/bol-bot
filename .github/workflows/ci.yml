name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr fonts-liberation libgl1
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check bol_bot tests
      - name: Test
        run: pytest --cov=bol_bot --cov-report=term-missing
